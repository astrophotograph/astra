<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astra Gallery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0e1a;
    color: #c8cdd8;
    min-height: 100vh;
  }

  header {
    padding: 2rem 2rem 1rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: #e8ecf4;
    margin-bottom: 0.25rem;
  }

  header .description {
    color: #8891a4;
    font-size: 0.95rem;
    margin-bottom: 0.75rem;
  }

  .stats {
    display: flex;
    gap: 2rem;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: #e8ecf4;
  }

  .stat-value.teal { color: #80cbc4; }

  .stat-label {
    font-size: 0.75rem;
    color: #6b7280;
  }

  .progress-bar {
    background: #1a1f2e;
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    max-width: 100%;
    margin-bottom: 0.25rem;
  }

  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 999px;
    transition: width 0.5s ease;
  }

  .progress-label {
    font-size: 0.85rem;
    color: #8b5cf6;
    margin-bottom: 1rem;
  }

  .updated {
    font-size: 0.8rem;
    color: #6b7280;
  }

  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 6px;
    padding: 1rem 2rem 3rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .catalog-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    background: #111525;
    border: 1px solid #1e2538;
    transition: transform 0.2s, border-color 0.2s;
    cursor: default;
  }

  .catalog-item.captured {
    border-color: #6366f1;
    cursor: pointer;
  }

  .catalog-item.captured:hover {
    transform: scale(1.03);
    border-color: #8b5cf6;
  }

  .catalog-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .catalog-item .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.25rem;
  }

  .catalog-item .id-label {
    position: absolute;
    top: 4px;
    left: 4px;
    background: rgba(0,0,0,0.7);
    color: #e8ecf4;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 3px;
  }

  .catalog-item.missing .id-label {
    color: #6b7280;
  }

  .catalog-item .count-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    background: #6366f1;
    color: #fff;
    font-size: 0.6rem;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 8px;
  }

  /* Image picker overlay */
  .picker {
    position: fixed;
    inset: 0;
    z-index: 900;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
  }

  .picker.open { display: flex; }

  .picker-content {
    background: #111525;
    border-radius: 8px;
    padding: 1.5rem;
    max-width: 700px;
    width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
  }

  .picker h2 {
    color: #e8ecf4;
    font-size: 1.2rem;
    margin-bottom: 0.25rem;
  }

  .picker .subtitle {
    color: #6b7280;
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }

  .picker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }

  .picker-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .picker-item:hover { border-color: #6366f1; }

  .picker-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .picker-item .picker-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 1.5rem 0.5rem 0.4rem;
    font-size: 0.7rem;
    color: #d1d5db;
  }

  .picker-item .fav-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    color: #fbbf24;
    font-size: 0.8rem;
  }

  .picker .close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    color: #9ca3af;
    font-size: 2rem;
    cursor: pointer;
  }

  .catalog-item .name-label {
    font-size: 1.05rem;
    color: #6b7280;
    text-align: center;
    padding: 0 8px;
  }

  .catalog-item .type-label {
    font-size: 0.85rem;
    color: #4b5563;
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 95vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 4px;
  }

  .lightbox .caption {
    margin-top: 0.75rem;
    font-size: 0.9rem;
    color: #9ca3af;
    text-align: center;
  }

  .lightbox .close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    color: #9ca3af;
    font-size: 2rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.5rem;
  }

  .lightbox .close:hover { color: #fff; }

  .lightbox .overlay-toggle {
    position: absolute;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #9ca3af;
    border: 1px solid #4b5563;
    padding: 0.4rem 1rem;
    border-radius: 4px;
    font-size: 0.8rem;
    cursor: pointer;
    z-index: 10;
  }

  .lightbox .overlay-toggle:hover { color: #fff; border-color: #6366f1; }
  .lightbox .overlay-toggle.active { background: #6366f1; color: #fff; border-color: #6366f1; }

  .lightbox .img-container {
    position: relative;
    display: inline-block;
  }

  .lightbox .img-container svg {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
  }

  .powered-by {
    text-align: center;
    padding: 1.5rem;
    color: #4b5563;
    font-size: 0.75rem;
  }

  .powered-by a { color: #6366f1; text-decoration: none; }
  .powered-by a:hover { text-decoration: underline; }

  .loading-msg {
    text-align: center;
    padding: 4rem;
    color: #6b7280;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0 2rem;
    max-width: 1400px;
    margin: 0 auto 0.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.35rem 0.75rem;
    border-radius: 4px;
    border: 1px solid #2a3040;
    background: transparent;
    color: #8891a4;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: #6366f1; color: #c8cdd8; }
  .filter-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }

  .refresh-time {
    margin-left: auto;
    font-size: 0.75rem;
    color: #4b5563;
  }

  @media (max-width: 640px) {
    .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 4px; padding: 0.5rem; }
    header { padding: 1rem; }
    header h1 { font-size: 1.3rem; }
    .stats { gap: 1rem; }
    .controls { padding: 0 0.5rem; }
  }
</style>
</head>
<body>
<header>
  <h1 id="title">Loading...</h1>
  <p class="description" id="description"></p>

    </div>
    <div class="stat">

    </div>

<div class="catalog-grid" id="grid"></div>

<div class="powered-by">Shared via <a href="https://astra.gallery">Astra</a></div>

</div>

<div class="lightbox" id="lightbox">

    </div>
  </div>
</div>

(function() {
  var manifest = null;
  var imageMap = {}; // M id -> array of manifest images
  var currentFilter = 'all'; // 'all', 'captured', 'missing'

  async function fetchManifest() {
    try {
      var resp = await fetch('manifest.json?t=' + Date.now());
      if (!resp.ok) return null;
      return await resp.json();
    } catch(e) { return null; }
  }

  // Pick the best thumbnail: favorited first, then most recent
  function bestImage(images) {
    if (!images || images.length === 0) return null;
    var fav = images.find(function(img) { return img.favorite; });
    if (fav) return fav;
    // Sort by createdAt descending, return newest
    return images.slice().sort(function(a, b) {
      return (b.createdAt || '').localeCompare(a.createdAt || '');
    })[0];
  }

  function render(m) {
    document.getElementById('title').textContent = m.collectionName;
    document.title = m.collectionName + ' \u2014 Astra Gallery';
    var desc = m.collectionDescription || '';
    if (m.dateRangeStart && m.dateRangeEnd) {
      var start = new Date(m.dateRangeStart + 'T00:00:00').toLocaleDateString();
      var end = new Date(m.dateRangeEnd + 'T00:00:00').toLocaleDateString();
      desc = (desc ? desc + ' \u2014 ' : '') + start + ' to ' + end;
    }
    document.getElementById('description').textContent = desc;
    document.getElementById('updated').textContent = 'Updated ' + new Date(m.updatedAt).toLocaleString();

    // Build image map: M id -> array of images
    imageMap = {};
    for (var i = 0; i < m.images.length; i++) {
      var img = m.images[i];
      var ids = img.catalogIds || [];
      for (var c = 0; c < ids.length; c++) {
        var cid = ids[c].toUpperCase().replace(/\s+/g, '');
        if (!imageMap[cid]) imageMap[cid] = [];
        // Avoid duplicates (same image matching multiple times)
        if (!imageMap[cid].find(function(x) { return x.id === img.id; })) {
          imageMap[cid].push(img);
        }
      }
    }

    // Count captured
    var captured = 0;
    for (var j = 0; j < MESSIER.length; j++) {
      if (imageMap[MESSIER[j].id] && imageMap[MESSIER[j].id].length > 0) captured++;
    }
    var pct = Math.round((captured / MESSIER.length) * 100);

    document.getElementById('captured-count').textContent = captured;
    document.getElementById('total-count').textContent = MESSIER.length;
    document.getElementById('completion').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent =
      captured + ' / ' + MESSIER.length + ' Messier objects (' + pct + '%)';

    // Update refresh time
    document.getElementById('refresh-time').textContent =
      'Last refreshed: ' + new Date().toLocaleTimeString();

    // Build grid
    var grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (var k = 0; k < MESSIER.length; k++) {
      var entry = MESSIER[k];
      var images = imageMap[entry.id] || [];
      var best = bestImage(images);

      // Apply filter
      if (currentFilter === 'captured' && !best) continue;
      if (currentFilter === 'missing' && best) continue;
      var div = document.createElement('div');
      div.className = 'catalog-item ' + (best ? 'captured' : 'missing');

      if (best) {
        var imgEl = document.createElement('img');
        imgEl.src = best.thumbPath;
        imgEl.alt = entry.id + (entry.name ? ' - ' + entry.name : '');
        imgEl.loading = 'lazy';
        div.appendChild(imgEl);

        // Click handler: if multiple images, show picker; otherwise lightbox
        div.onclick = (function(imgs, ent) {
          return function() {
            if (imgs.length > 1) {
              openPicker(imgs, ent);
            } else {
              openLightbox(imgs[0], ent);
            }
          };
        })(images, entry);

        // Show count badge if multiple images
        if (images.length > 1) {
          var badge = document.createElement('div');
          badge.className = 'count-badge';
          badge.textContent = images.length;
          div.appendChild(badge);
        }
      } else {
        var ph = document.createElement('div');
        ph.className = 'placeholder';
        var nameEl = document.createElement('div');
        nameEl.className = 'name-label';
        nameEl.textContent = entry.name || entry.type;
        ph.appendChild(nameEl);
        var typeEl = document.createElement('div');
        typeEl.className = 'type-label';
        typeEl.textContent = entry.con;
        ph.appendChild(typeEl);
        div.appendChild(ph);
      }

      var label = document.createElement('div');
      label.className = 'id-label';
      label.textContent = entry.id;
      div.appendChild(label);

      grid.appendChild(div);
    }
  }

  function openPicker(images, entry) {
    document.getElementById('picker-title').textContent =
      entry.id + (entry.name ? ' \u2014 ' + entry.name : '');
    document.getElementById('picker-subtitle').textContent =
      images.length + ' image' + (images.length !== 1 ? 's' : '') + ' \u2014 ' + entry.type;

    var grid = document.getElementById('picker-grid');
    grid.innerHTML = '';

    // Sort: favorited first, then by date descending
    var sorted = images.slice().sort(function(a, b) {
      if (a.favorite && !b.favorite) return -1;
      if (!a.favorite && b.favorite) return 1;
      return (b.createdAt || '').localeCompare(a.createdAt || '');
    });

    for (var i = 0; i < sorted.length; i++) {
      var img = sorted[i];
      var item = document.createElement('div');
      item.className = 'picker-item';

      var imgEl = document.createElement('img');
      imgEl.src = img.thumbPath;
      imgEl.alt = img.summary || img.filename;
      imgEl.loading = 'lazy';
      item.appendChild(imgEl);

      var lbl = document.createElement('div');
      lbl.className = 'picker-label';
      lbl.textContent = img.summary || img.filename;
      item.appendChild(lbl);

      if (img.favorite) {
        var fav = document.createElement('div');
        fav.className = 'fav-badge';
        fav.textContent = '\u2605';
        item.appendChild(fav);
      }

      item.onclick = (function(image, ent) {
        return function() {
          closePicker();
          openLightbox(image, ent);
        };
      })(img, entry);

      grid.appendChild(item);
    }

    document.getElementById('picker').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  window.setFilter = function(mode) {
    currentFilter = mode;
    // Update button styles
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.remove('active');
    });
    document.getElementById('filter-' + mode).classList.add('active');
    // Re-render with current manifest
    if (manifest) render(manifest);
  };

  window.closePicker = function() {
    document.getElementById('picker').classList.remove('open');
    document.body.style.overflow = '';
  };

  var currentLightboxImg = null;
  var overlayVisible = false;
  var lbMagLimit = 15;

  function openLightbox(img, entry) {
    currentLightboxImg = img;
    overlayVisible = false;
    var lbImg = document.getElementById('lb-img');
    lbImg.src = img.imagePath;
    document.getElementById('lb-caption').textContent =
      entry.id + (entry.name ? ' \u2014 ' + entry.name : '') + ' (' + entry.type + ')';

    var existing = document.getElementById('lb-overlay');
    if (existing) existing.remove();

    var hasOverlay = img.plateSolve && img.objects && img.objects.length > 0;
    document.getElementById('overlay-toggle').style.display = hasOverlay ? 'inline-block' : 'none';
    document.getElementById('lb-mag-control').style.display = 'none';
    document.getElementById('overlay-toggle').classList.remove('active');
    document.getElementById('overlay-toggle').textContent = 'Show Objects';

    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';

    lbImg.onload = function() {
      if (img.plateSolve && img.objects) {
        renderOverlay(img, lbImg);
      }
    };
  }

  // Gnomonic (TAN) projection: RA/Dec to pixel
  function projectObject(ps, objRa, objDec, w, h) {
    var d2r = Math.PI / 180;
    var ra0 = ps.centerRa * d2r;
    var dec0 = ps.centerDec * d2r;
    var ra = objRa * d2r;
    var dec = objDec * d2r;

    var cosDec = Math.cos(dec), sinDec = Math.sin(dec);
    var cosDec0 = Math.cos(dec0), sinDec0 = Math.sin(dec0);
    var cosDRa = Math.cos(ra - ra0), sinDRa = Math.sin(ra - ra0);

    var sinD = sinDec0 * sinDec + cosDec0 * cosDec * cosDRa;
    if (sinD <= 0) return null;

    var xi = (cosDec * sinDRa) / sinD;
    var eta = (cosDec0 * sinDec - sinDec0 * cosDec * cosDRa) / sinD;
    var xiDeg = xi / d2r;
    var etaDeg = eta / d2r;

    var rotRad = (ps.rotation || 0) * d2r;
    var cosR = Math.cos(rotRad), sinR = Math.sin(rotRad);

    // Standard tangent plane to FITS pixel mapping
    var dxFits = -xiDeg * sinR + etaDeg * cosR;
    var dyFits = xiDeg * cosR + etaDeg * sinR;

    // Check if display is transposed relative to FITS
    var fitsAspect = ps.widthDeg / ps.heightDeg;
    var displayAspect = w / h;
    var isTransposed = (fitsAspect < 1) !== (displayAspect < 1);

    var fracX, fracY;
    if (isTransposed) {
      fracX = 0.5 - dyFits / ps.heightDeg;
      fracY = 0.5 - dxFits / ps.widthDeg;
    } else {
      fracX = 0.5 + dxFits / ps.widthDeg;
      fracY = 0.5 - dyFits / ps.heightDeg;
    }

    if (fracX < -0.1 || fracX > 1.1 || fracY < -0.1 || fracY > 1.1) return null;
    return { x: fracX * w, y: fracY * h };
  }

  function renderOverlay(img, lbImg) {
    var existing = document.getElementById('lb-overlay');
    if (existing) existing.remove();

    var ps = img.plateSolve;
    if (!ps) return;

    var w = lbImg.clientWidth;
    var h = lbImg.clientHeight;
    if (w === 0 || h === 0) return;

    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.id = 'lb-overlay';
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);
    svg.style.display = overlayVisible ? 'block' : 'none';

    var pxPerDegW = w / ps.widthDeg;

    for (var i = 0; i < img.objects.length; i++) {
      var obj = img.objects[i];
      // Fill in missing magnitudes from known Messier data
      var mag = obj.magnitude;
      if (mag == null) {
        var mKey = obj.name.replace(/\s+/g, '').toUpperCase();
        mag = MESSIER_MAGS[mKey] || 99;
      }
      if (mag > lbMagLimit + 2) continue;

      var pos = projectObject(ps, obj.ra, obj.dec, w, h);
      if (!pos) continue;

      var radius = 20;
      if (obj.sizeArcmin && ps.widthDeg) {
        radius = Math.max(12, Math.min(w / 3, (obj.sizeArcmin / 60) * pxPerDegW / 2));
      }

      var opacity = mag <= lbMagLimit
        ? 0.85
        : Math.max(0.05, 0.85 * (1 - (mag - lbMagLimit) / 2));
      var showLabel = mag <= lbMagLimit;

      var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('opacity', opacity);

      var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', pos.x);
      circle.setAttribute('cy', pos.y);
      circle.setAttribute('r', radius);
      circle.setAttribute('fill', 'none');
      circle.setAttribute('stroke', '#6366f1');
      circle.setAttribute('stroke-width', '1.5');
      g.appendChild(circle);

      if (showLabel) {
        var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', pos.x);
        text.setAttribute('y', pos.y + radius + 14);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', '#6366f1');
        text.setAttribute('font-size', '12');
        text.setAttribute('font-weight', '500');
        text.style.textShadow = '0 1px 3px rgba(0,0,0,0.9)';
        text.textContent = obj.name;
        g.appendChild(text);
      }

      svg.appendChild(g);
    }

    document.getElementById('lb-container').appendChild(svg);
  }

  window.updateMagFilter = function(val) {
    lbMagLimit = parseFloat(val);
    document.getElementById('lb-mag-val').textContent = val;
    if (currentLightboxImg && overlayVisible) {
      renderOverlay(currentLightboxImg, document.getElementById('lb-img'));
      var svg = document.getElementById('lb-overlay');
      if (svg) svg.style.display = 'block';
    }
  };

  window.toggleOverlay = function() {
    overlayVisible = !overlayVisible;
    var svg = document.getElementById('lb-overlay');
    if (svg) svg.style.display = overlayVisible ? 'block' : 'none';
    var btn = document.getElementById('overlay-toggle');
    btn.classList.toggle('active', overlayVisible);
    btn.textContent = overlayVisible ? 'Hide Objects' : 'Show Objects';
    document.getElementById('lb-mag-control').style.display = overlayVisible ? 'flex' : 'none';
  };

  window.closeLightbox = function() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    currentLightboxImg = null;
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (document.getElementById('lightbox').classList.contains('open')) {
        closeLightbox();
      } else if (document.getElementById('picker').classList.contains('open')) {
        closePicker();
      }
    }
  });

  // Initial load
  fetchManifest().then(function(m) {
    if (!m) {
      document.getElementById('title').textContent = 'Gallery Not Found';
      return;
    }
    manifest = m;
    render(m);
  });

  // Auto-refresh every 30s
  setInterval(function() {
    fetchManifest().then(function(m) {
      if (!m) return;
      manifest = m;
      render(m);
    });
  }, 30000);
})();
</script>
</body>
</html>
